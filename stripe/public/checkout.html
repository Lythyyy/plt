<!DOCTYPE html>
<html>
  <head>
    <title>Buy cool new product</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.stripe.com/clover/stripe.js"></script>
  </head>
  <body>
    <section>
      <div class="product">
        <img src="https://i.imgur.com/EHyR2nP.png" alt="Abonnement aux CVE récentes" />

          <h3>Abonnement aux CVE récentes</h3>
          <h5>10 € par mois</h5>
        </div>
      </div>
      <form action="/create-checkout-session" method="POST">

      </form>
    </section>
  </body>
</html>
